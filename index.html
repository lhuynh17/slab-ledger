<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Slab Ledger</title>

<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#050507" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Slab Ledger" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<link rel="icon" href="./icons/icon-192.png" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&family=JetBrains+Mono:wght@500&display=swap');
  :root {
    --bg: #1A1B1D; --surface: #232426; --surface2: #2B2C2F; --border: #323335;
    --text: #E8E7E4; --text-dim: #8C8B87; --accent: #3E5C6E; --gold: #C9A24B; --green: #3FA35D; --danger: #D2483C;
    --surface-blur: rgba(35,36,38,.78); --nav-blur: rgba(35,36,38,.85);
  }
  [data-theme="light"] {
    --bg: #F5F5F3; --surface: #FFFFFF; --surface2: #F1F1EF; --border: #E3E2DD;
    --text: #1E2430; --text-dim: #6B7280; --accent: #1E3A5F; --gold: #B8873A; --green: #2F8F52; --danger: #C13E33;
    --surface-blur: rgba(255,255,255,.82); --nav-blur: rgba(255,255,255,.88);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); overscroll-behavior: none; }
  body { font-family: 'Inter', sans-serif; }
  .font-display { font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.01em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  input:focus, select:focus, textarea:focus { box-shadow: 0 0 0 2px var(--gold); outline: none; }
  ::-webkit-scrollbar { display: none; }
  #root { min-height: 100vh; }

  /* --- Minimal Tailwind-equivalent utility subset (no build step) --- */
  .flex{display:flex}.inline-flex{display:inline-flex}.grid{display:grid}.hidden{display:none}.block{display:block}
  .flex-col{flex-direction:column}.flex-1{flex:1 1 0%}.items-center{align-items:center}.items-start{align-items:flex-start}
  .justify-center{justify-content:center}.justify-between{justify-content:space-between}
  .grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-cols-5{grid-template-columns:repeat(5,minmax(0,1fr))}
  .gap-1{gap:.25rem}.gap-1\.5{gap:.375rem}.gap-2{gap:.5rem}.gap-3{gap:.75rem}
  .w-full{width:100%}.min-w-0{min-width:0}.max-h-80{max-height:20rem}.shrink-0{flex-shrink:0}
  .rounded{border-radius:.25rem}.rounded-lg{border-radius:.5rem}.rounded-xl{border-radius:.75rem}.rounded-full{border-radius:9999px}
  .overflow-hidden{overflow:hidden}.overflow-y-auto{overflow-y:auto}.overflow-x-auto{overflow-x:auto}
  .relative{position:relative}.fixed{position:fixed}.sticky{position:sticky}.absolute{position:absolute}
  .top-0{top:0}.top-3{top:.75rem}.top-1\/2{top:50%}.inset-0{inset:0}.inset-x-0{left:0;right:0}.inset-x-8{left:2rem;right:2rem}.bottom-0{bottom:0}.left-1\/2{left:50%}.z-30{z-index:30}.z-50{z-index:50}
  .-translate-x-1\/2{transform:translateX(-50%)}.-translate-y-1\/2{transform:translateY(-50%)}
  .px-2{padding-left:.5rem;padding-right:.5rem}.px-3{padding-left:.75rem;padding-right:.75rem}.px-4{padding-left:1rem;padding-right:1rem}.px-8{padding-left:2rem;padding-right:2rem}
  .py-1{padding-top:.25rem;padding-bottom:.25rem}.py-1\.5{padding-top:.375rem;padding-bottom:.375rem}.py-2{padding-top:.5rem;padding-bottom:.5rem}.py-2\.5{padding-top:.625rem;padding-bottom:.625rem}.py-3{padding-top:.75rem;padding-bottom:.75rem}.py-3\.5{padding-top:.875rem;padding-bottom:.875rem}.py-4{padding-top:1rem;padding-bottom:1rem}.py-5{padding-top:1.25rem;padding-bottom:1.25rem}.py-16{padding-top:4rem;padding-bottom:4rem}
  .pt-4{padding-top:1rem}.pb-28{padding-bottom:7rem}.pl-10{padding-left:2.5rem}.pr-2{padding-right:.5rem}.pr-4{padding-right:1rem}
  .p-3{padding:.75rem}.p-4{padding:1rem}
  .m-0{margin:0}.mx-auto{margin-left:auto;margin-right:auto}.mb-1{margin-bottom:.25rem}.mb-1\.5{margin-bottom:.375rem}.mb-2{margin-bottom:.5rem}.mb-3{margin-bottom:.75rem}.mb-4{margin-bottom:1rem}.mb-5{margin-bottom:1.25rem}.mb-6{margin-bottom:1.5rem}.mt-0\.5{margin-top:.125rem}.mt-1{margin-top:.25rem}.mt-1\.5{margin-top:.375rem}.mt-2{margin-top:.5rem}.my-2{margin-top:.5rem;margin-bottom:.5rem}
  .h-24{height:6rem}.h-px{height:1px}.min-h-screen{min-height:100vh}
  .text-xs{font-size:.75rem;line-height:1rem}.text-sm{font-size:.875rem;line-height:1.25rem}.text-base{font-size:1rem;line-height:1.5rem}.text-lg{font-size:1.125rem;line-height:1.75rem}.text-xl{font-size:1.25rem;line-height:1.75rem}.text-2xl{font-size:1.5rem;line-height:2rem}.text-4xl{font-size:2.25rem;line-height:2.5rem}
  .text-\[10px\]{font-size:10px}.text-\[11px\]{font-size:11px}
  .font-medium{font-weight:500}.font-semibold{font-weight:600}.font-bold{font-weight:700}
  .uppercase{text-transform:uppercase}.tracking-wide{letter-spacing:.025em}.tracking-widest{letter-spacing:.1em}
  .truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.leading-none{line-height:1}
  .text-center{text-align:center}.text-left{text-align:left}
  .opacity-40{opacity:.4}.opacity-50{opacity:.5}
  .transition-transform{transition:transform .15s ease}
  .active\:scale-\[0\.98\]:active{transform:scale(.98)}.active\:scale-\[0\.97\]:active{transform:scale(.97)}
  .disabled\:opacity-40:disabled{opacity:.4}.disabled\:opacity-50:disabled{opacity:.5}
  .object-cover{object-fit:cover}
  .appearance-none{appearance:none}
  .shadow-lg{box-shadow:0 10px 15px -3px rgba(0,0,0,.4)}
  .text-white{color:#fff}.text-white\/80{color:rgba(255,255,255,.8)}
  a, button { cursor: pointer; font-family: inherit; }
  button { border: none; }

  /* --- Polish pass: depth, motion, frosted surfaces --- */
  .shadow-card { box-shadow: 0 1px 2px rgba(0,0,0,.24), 0 4px 12px rgba(0,0,0,.28); }
  .shadow-btn { box-shadow: 0 2px 6px rgba(0,0,0,.3); }
  .tabular-nums { font-variant-numeric: tabular-nums; }
  .header-blur { background: var(--surface-blur); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
  .nav-blur { background: var(--nav-blur); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
  .nav-safe-pad { padding-bottom: calc(0.625rem + env(safe-area-inset-bottom, 0px)); }

  @keyframes screenFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .screen-fade { animation: screenFadeIn .22s ease-out; }

  @keyframes pulseSkeleton { 0%, 100% { opacity: .5; } 50% { opacity: .9; } }
  .skeleton { background: var(--surface2); border-radius: .5rem; animation: pulseSkeleton 1.3s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="./storage.js"></script>
<script src="./psa.js"></script>

<script>
  fetch('./app.js')
    .then((r) => r.text())
    .then((code) => {
      const out = Babel.transform(code, { presets: [['react', { runtime: 'classic' }]] }).code;
      const s = document.createElement('script');
      s.text = out;
      document.body.appendChild(s);
    })
    .catch((err) => {
      document.getElementById('root').innerHTML =
        '<div style="color:#EDEFF2;padding:24px;font-family:sans-serif">' +
        '<p style="font-weight:600;margin-bottom:8px">The app failed to load.</p>' +
        '<p style="color:#8A919C;font-size:14px">' + (err && err.message ? err.message : String(err)) + '</p>' +
        '</div>';
    });
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
